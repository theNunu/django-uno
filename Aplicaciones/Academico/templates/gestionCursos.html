{% extends "./base.html" %}
{% block title %} Gestion de cursos {% endblock %}
{% block body %}
<!-- <button type="button"  class="btn-btn-primary text-white rounded w-75" >
    crear
</button> -->
<style>
    /* Para Chrome, Safari y Edge moderno */
    .scroll-oculto::-webkit-scrollbar {
        display: none;
    }

    .modal-overlay {
        position: fixed; /* clave para que los objteos pasen pa atras*/
        top: 0; /* clave para que los objteos pasen pa atras*/
        left: 0; /* clave para que los objteos pasen pa atras*/
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7);
        /* Fondo oscuro */
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    .my-modal {
        background-color: white;
        padding: 30px;
        width: 400px;
    }
</style>



<!-- 
 height: 300px; /* O máx-height para un límite máximo */
  overflow-y: auto; /* Muestra el scroll vertical solo cuando sea necesario */
  border: 1px solid #ccc;
  padding: 10px;

-->
<div>

    form
    <div class=" w-25 p-4 border">
        <div class="h2 text-center">crear producto</div>
        <div class="card-body ">
            <form action="/registrarCurso/" method="POST"> {% csrf_token %}
                <div class="form-group">
                    <label class="form-label ">codigo</label>
                    <input type="text" id="txtCodigo" name="txtCodigo" class="form-control" placeholder="44242"
                        minlegth="6" minlegth="6" required>
                </div>

                <div class="form-group">
                    <label class="form-label">nombre</label>
                    <input type="text" id="txtNombre" name="txtNombre" class="form-control" placeholder="Curso de Tilin"
                        minlegth="6" minlegth="6" required>

                </div>

                <div class="form-group">
                    <label class="form-label">creditos</label>
                    <input type="text" id="txtCredito" name="txtCredito" class="form-control" placeholder="2" min="1"
                        max="9" required>
                </div>

                <div class="form-group mt-3">
                    <button type="submit" class="btn btn-success btn-block"> crear</button>
                </div>


            </form>

        </div>

    </div>

</div>
<div class="container">
    <button type="button" class="btn btn-primary"> crear</button>
    <div class="scroll-oculto" style=" max-height: 300px; overflow-y: auto;">
        <table class="table table-striped mt-5">
            <thead>
                <tr>
                    <th scope="col">Codigo</th>
                    <th scope="col">Nombre</th>
                    <th scope="col">Creditos</th>
                    <th scope="col">Opciones</th>
                </tr>
            </thead>
            <tbody>
                {% for c in cursos %}
                <tr>
                    <th>{{ c.codigo }}</th>
                    <td>{{ c.nombre }}</td>
                    <td> {{ c.creditos }}</td>
                    <td>
                        <button class="btn btn-danger">
                            eliminar
                        </button>
                        <button class="btn btn-warning text-white">
                            editar
                        </button>
            
                        <button class="btn btn-info btn-sm" onclick="abrirModal('{{ c.codigo }}')">ver</button>
                    </td>

                </tr>
                {% endfor %}

            </tbody>
        </table>


    </div>

</div>
<h2>dadad</h2>
<div id="miModalCustom" class="modal-overlay" style="display: none;">
    <div class="my-modal rounded text-center">
        <div class="h2">Detalle del Registro</div>
        <div id="modal-detalle">
        </div>
        <button onclick="cerrarModal()" class="btn btn-secondary mt-3">Cerrar</button>
    </div>
</div>

<script>
    function abrirModal(codigo) {
        console.log('el codigo', codigo)
        // 1. Hacemos la petición a la URL que ya tienes definida
        fetch(`/detalle-curso/${codigo}/`)
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    console.log("Error: " + data.error);
                } else {
                    console.log('la data:', data)
                    // 2. Inyectamos los datos en el HTML del modal
                    const contenedor = document.getElementById('modal-detalle');
                    contenedor.innerHTML = `
                    <p><strong>Código:</strong> ${data.codigo}</p>
                    <p><strong>Nombre:</strong> ${data.nombre}</p>
                    <p><strong>Créditos:</strong> ${data.creditos}</p>
                `;
                    // 3. Mostramos el modal
                    document.getElementById('miModalCustom').style.display = 'flex';
                }
            })
            .catch(error => console.error('Error:', error));
    }

    function cerrarModal() {
        document.getElementById('miModalCustom').style.display = 'none';
    }

    // Opcional: Cerrar si hacen clic fuera del cuadrito blanco
    window.onclick = function (event) {
        let modal = document.getElementById('miModalCustom');
        if (event.target == modal) {
            cerrarModal();
        }
    }
</script>





{% endblock %}
