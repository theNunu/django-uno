{% extends "./base.html" %}
{% block title %} Gestion de cursos {% endblock %}
{% block body %}
<!-- <button type="button"  class="btn-btn-primary text-white rounded w-75" >
    crear
</button> -->
<style>
    /* Para Chrome, Safari y Edge moderno */
    .scroll-oculto::-webkit-scrollbar {
        display: none;
    }

    .modal-overlay {
        position: fixed;
        /* clave para que los objteos pasen pa atras*/
        top: 0;
        /* clave para que los objteos pasen pa atras*/
        left: 0;
        /* clave para que los objteos pasen pa atras*/
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7);
        /* Fondo oscuro */
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    .my-modal {
        background-color: white;
        padding: 30px;
        width: 400px;
    }
</style>

<!-- 
 height: 300px; /* O máx-height para un límite máximo */
  overflow-y: auto; /* Muestra el scroll vertical solo cuando sea necesario */
  border: 1px solid #ccc;
  padding: 10px;

-->
<div class="container">
    <button class="btn btn-success btn-block mt-5" onclick="abrirModalCrear()">
        crear curso
    </button>
    <!-- <button type="button" class="btn btn-primary"> crear</button> -->
    <div class="scroll-oculto mt-3" style=" max-height: 500px; overflow-y: auto;">
        <table class="table table-striped mt-5">
            <thead>
                <tr>
                    <th scope="col">Codigo</th>
                    <th scope="col">Nombre</th>
                    <th scope="col">Creditos</th>
                    <th scope="col">Opciones</th>
                </tr>
            </thead>
            <tbody>
                {% for c in cursos %}
                <tr>
                    <th>{{ c.codigo }}</th>
                    <td>{{ c.nombre }}</td>
                    <td> {{ c.creditos }}</td>
                    <td>
                        <button class="btn btn-danger">
                            eliminar
                        </button>
                        <button class="btn btn-warning text-white">
                            editar
                        </button>

                        <button class="btn btn-info btn-sm" onclick="abrirModal('{{ c.codigo }}')">ver</button>
                    </td>

                </tr>
                {% endfor %}

            </tbody>
        </table>


    </div>

</div>
<h2>dadad</h2>
<div id="miModalCustom" class="modal-overlay" style="display: none;">
    <div class="my-modal rounded text-center">
        <div class="h2">Detalle del Registro</div>
        <div id="modal-detalle">
        </div>
        <button onclick="cerrarModal()" class="btn btn-secondary mt-3">Cerrar</button>
    </div>
</div>

<h3>crear</h3>
<div id="modalCrear" class="modal-overlay" style="display: none;">
    <div class="my-modal rounded">
        <div class="h2 text-center">Crear Nuevo Curso</div>
        <form id="formCrearCurso">
            {% csrf_token %}
            <div class="form-group">
                <label>Código</label>
                <input type="text" name="txtCodigo" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" name="txtNombre" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Créditos</label>
                <input type="number" name="txtCredito" class="form-control" required>
            </div>
            <div class="mt-3 d-flex justify-content-between">
                <button type="button" onclick="cerrarModalCrear()" class="btn btn-secondary">Cancelar</button>
                <button type="submit" class="btn btn-success">Guardar Curso</button>
            </div>
        </form>
    </div>
</div>

<script>
    function abrirModal(codigo) {
        console.log('el codigo', codigo)
        // 1. Hacemos la petición a la URL que ya tienes definida
        fetch(`/detalle-curso/${codigo}/`)
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    console.log("Error: " + data.error);
                } else {
                    console.log('la data:', data)
                    // 2. Inyectamos los datos en el HTML del modal
                    const contenedor = document.getElementById('modal-detalle');
                    contenedor.innerHTML = `
                    <p><strong>Código:</strong> ${data.codigo}</p>
                    <p><strong>Nombre:</strong> ${data.nombre}</p>
                    <p><strong>Créditos:</strong> ${data.creditos}</p>
                `;
                    // 3. Mostramos el modal
                    document.getElementById('miModalCustom').style.display = 'flex';
                }
            })
            .catch(error => console.error('Error:', error));
    }

    function cerrarModal() {
        document.getElementById('miModalCustom').style.display = 'none';
    }

    // Opcional: Cerrar si hacen clic fuera del cuadrito blanco
    window.onclick = function (event) {
        let modal = document.getElementById('miModalCustom');
        if (event.target == modal) {
            cerrarModal();
        }
    }

    //---------------------------------------------------
    // Escuchar el envío del formulario

    function abrirModalCrear() {
        document.getElementById('modalCrear').style.display = 'flex';
    }

    function cerrarModalCrear() {
        document.getElementById('modalCrear').style.display = 'none';
        document.getElementById('formCrearCurso').reset(); // Limpia los campos
    }

    document.getElementById('formCrearCurso').onsubmit = function (e) {
        e.preventDefault(); // <--- EVITA QUE LA PÁGINA SE RECARGUE

        const formData = new FormData(this);

        fetch('/registrarCurso/', {
            method: 'POST',
            body: formData,
            headers: {
                "X-CSRFToken": formData.get('csrfmiddlewaretoken') // Seguridad de Django
            }
        })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    alert(data.message);
                    cerrarModalCrear();
                    location.reload(); // Recarga solo al tener éxito o podrías agregar la fila con JS
                }
            })
            .catch(error => console.error('Error:', error));
    };
</script>





{% endblock %}
